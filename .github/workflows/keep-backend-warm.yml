name: Keep backend warm

on:
  schedule:
    # Every 10 minutes. Render's free tier spins down after ~15 min of no
    # traffic, and the next request then pays a 20-60s cold-start penalty.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend root endpoint
        run: curl -sf -o /dev/null -w "status:%{http_code} time:%{time_total}s\n" https://workflow-vi00.onrender.com/
