openapi: 3.0.3
info:
  title: Dynamic Workflow & Approval Engine API
  description: |
    A configurable, data-driven approval engine. Administrators define workflows
    (steps, approvers, conditions) entirely through this API — no workflow logic
    is hardcoded in the application. See `docs/API.md` and the project README
    for the full narrative documentation this spec mirrors.
  version: "1.0.0"
  contact:
    name: Project README
    url: https://github.com/EngKARANGWA/workflow

servers:
  - url: https://workflow-vi00.onrender.com/api
    description: Deployed (Render)
  - url: http://127.0.0.1:8000/api
    description: Local development (php artisan serve default port)
  - url: http://127.0.0.1:8123/api
    description: Local development (custom port)

tags:
  - name: Authentication
  - name: Users
  - name: Roles
  - name: Workflows
  - name: Requests
  - name: Delegations
  - name: Notifications

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new account (always created as a Requester)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name: { type: string, example: "Jane Doe" }
                email: { type: string, format: email, example: "jane@example.com" }
                password: { type: string, format: password, minLength: 8, example: "secret123" }
                password_confirmation: { type: string, format: password, example: "secret123" }
                department: { type: string, nullable: true }
                employee_level: { type: string, nullable: true }
                country: { type: string, nullable: true }
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
                  token: { type: string, example: "1|abcdef123456..." }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/login:
    post:
      tags: [Authentication]
      summary: Log in and obtain a Sanctum bearer token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
                  token: { type: string }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Revoke the current access token
      responses:
        '200':
          description: Logged out
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get the current authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /users:
    get:
      tags: [Users]
      summary: List users (admin only)
      parameters:
        - name: system_role
          in: query
          schema: { type: string, enum: [system_administrator, approver, requester] }
        - name: per_page
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedUsers' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Users]
      summary: Create a user with any system role (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreUserRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Users]
      summary: Get a user (admin only)
      responses:
        '200':
          description: User
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Users]
      summary: Update a user (admin only)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreUserRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Users]
      summary: Delete a user (admin only)
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /roles:
    get:
      tags: [Roles]
      summary: List business/routing roles (admin only)
      responses:
        '200':
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Role' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Roles]
      summary: Create a business role (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: "Finance" }
                description: { type: string, nullable: true }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Role' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /roles/{id}:
    delete:
      tags: [Roles]
      summary: Delete a business role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /workflows:
    get:
      tags: [Workflows]
      summary: List workflows
      parameters:
        - name: is_active
          in: query
          schema: { type: boolean }
        - name: per_page
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated workflow list (with current version)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedWorkflows' }
    post:
      tags: [Workflows]
      summary: Create a workflow and its first version (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreWorkflowRequest' }
            example:
              name: "Purchase Request"
              description: "Standard purchase approval flow"
              steps:
                - approval_type: single
                  approvers: [{ approver_type: role, role_id: 4 }]
                - approval_type: all
                  conditions: [{ field: amount, operator: greater_than, value: 10000 }]
                  approvers:
                    - { approver_type: role, role_id: 1 }
                    - { approver_type: role, role_id: 2 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Workflow' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /workflows/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Workflows]
      summary: Get full workflow detail (all versions, steps, approver defs)
      responses:
        '200':
          description: Workflow detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Workflow' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Workflows]
      summary: Update workflow metadata only — name/description/is_active (admin only)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string, nullable: true }
                is_active: { type: boolean }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Workflow' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /workflows/{id}/versions:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Workflows]
      summary: List every version of a workflow (admin only)
      responses:
        '200':
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WorkflowVersion' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Workflows]
      summary: Publish a new version (admin only) — old version and its requests are untouched
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [steps]
              properties:
                steps:
                  type: array
                  items: { $ref: '#/components/schemas/StepDefinition' }
      responses:
        '201':
          description: New version created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowVersion' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /requests:
    get:
      tags: [Requests]
      summary: List requests
      parameters:
        - name: scope
          in: query
          description: "mine (default) | pending_my_approval | all (admin only)"
          schema: { type: string, enum: [mine, pending_my_approval, all], default: mine }
        - name: per_page
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated request list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedRequests' }
    post:
      tags: [Requests]
      summary: Submit a request against a workflow's current version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workflow_id, title, data]
              properties:
                workflow_id: { type: integer, example: 1 }
                title: { type: string, example: "New laptop purchase" }
                data:
                  type: object
                  additionalProperties: true
                  example: { amount: 15000, department: "Engineering" }
      responses:
        '201':
          description: Request submitted (first applicable step already activated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowRequest' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /requests/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Requests]
      summary: Get full request detail (steps, approvers, decisions)
      description: Accessible to the requester, any assigned approver (past or present), or an admin.
      responses:
        '200':
          description: Request detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /requests/{id}/history:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Requests]
      summary: Get the immutable audit trail for a request
      responses:
        '200':
          description: Audit log entries, newest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AuditLogEntry' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /requests/{id}/decide:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Requests]
      summary: Record an approval decision on the request's currently active step
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision: { type: string, enum: [approved, rejected, returned] }
                comments: { type: string, nullable: true }
      responses:
        '200':
          description: Updated request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowRequest' }
        '403':
          description: You are not an approver for this request's current step
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '409':
          description: You have already acted on this step
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }
        '422':
          description: This request has no step currently awaiting approval
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /requests/{id}/resubmit:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Requests]
      summary: Resubmit a returned request (requester only) — reactivates the same step
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Resubmitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: Only requests that were returned for modification can be resubmitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorMessage' }

  /delegations:
    get:
      tags: [Delegations]
      summary: List delegations you've given or received (approver/admin only)
      responses:
        '200':
          description: Delegations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Delegation' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Delegations]
      summary: Delegate your approval authority to another approver for a period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [delegate_id, starts_at, ends_at]
              properties:
                delegate_id: { type: integer }
                starts_at: { type: string, format: date-time }
                ends_at: { type: string, format: date-time }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Delegation' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /delegations/{id}:
    delete:
      tags: [Delegations]
      summary: Revoke a delegation (delegator or admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Revoked }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notifications:
    get:
      tags: [Notifications]
      summary: List your in-app notifications, newest first
      parameters:
        - name: per_page
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Notification' }

  /notifications/{id}/read:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Notifications]
      summary: Mark a notification as read
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Notification' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "Sanctum personal access token"
      description: "Obtain via POST /auth/login or /auth/register, then send as `Authorization: Bearer <token>`."

  responses:
    Unauthenticated:
      description: Missing or invalid token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorMessage' }
    Forbidden:
      description: Authenticated, but not permitted to perform this action
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorMessage' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorMessage' }
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string, example: "The given data was invalid." }
              errors:
                type: object
                additionalProperties:
                  type: array
                  items: { type: string }

  schemas:
    ErrorMessage:
      type: object
      properties:
        message: { type: string }

    User:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Jane Doe" }
        email: { type: string, format: email }
        system_role: { type: string, enum: [system_administrator, approver, requester] }
        department: { type: string, nullable: true }
        employee_level: { type: string, nullable: true }
        country: { type: string, nullable: true }
        roles:
          type: array
          items: { $ref: '#/components/schemas/Role' }

    StoreUserRequest:
      type: object
      required: [name, email, password, system_role]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        system_role: { type: string, enum: [system_administrator, approver, requester] }
        department: { type: string, nullable: true }
        employee_level: { type: string, nullable: true }
        country: { type: string, nullable: true }
        role_ids:
          type: array
          items: { type: integer }
          description: Business role IDs to assign (see GET /roles)

    Role:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, example: "Finance" }
        description: { type: string, nullable: true }

    Workflow:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        is_active: { type: boolean }
        created_by: { type: integer }
        versions:
          type: array
          items: { $ref: '#/components/schemas/WorkflowVersion' }

    WorkflowVersion:
      type: object
      properties:
        id: { type: integer }
        workflow_id: { type: integer }
        version_number: { type: integer }
        is_current: { type: boolean }
        steps:
          type: array
          items: { $ref: '#/components/schemas/WorkflowStep' }

    WorkflowStep:
      type: object
      properties:
        id: { type: integer }
        step_order: { type: integer }
        approval_type: { type: string, enum: [single, all] }
        conditions:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/Condition' }
        approver_defs:
          type: array
          items: { $ref: '#/components/schemas/ApproverDef' }

    StepDefinition:
      type: object
      required: [approval_type, approvers]
      properties:
        approval_type: { type: string, enum: [single, all] }
        conditions:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/Condition' }
        approvers:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/ApproverDef' }

    Condition:
      type: object
      required: [field, operator, value]
      properties:
        field: { type: string, example: "amount" }
        operator:
          type: string
          enum: [equals, not_equals, greater_than, greater_than_or_equal, less_than, less_than_or_equal, in]
        value:
          description: Scalar or array, depending on operator
          example: 10000

    ApproverDef:
      type: object
      required: [approver_type]
      properties:
        approver_type: { type: string, enum: [role, user] }
        role_id: { type: integer, nullable: true }
        user_id: { type: integer, nullable: true }

    StoreWorkflowRequest:
      type: object
      required: [name, steps]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        steps:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/StepDefinition' }

    WorkflowRequest:
      type: object
      properties:
        id: { type: integer }
        workflow_version_id: { type: integer }
        requester_id: { type: integer }
        title: { type: string }
        data:
          type: object
          additionalProperties: true
        status: { type: string, enum: [in_progress, approved, rejected, returned] }
        current_step_order: { type: integer, nullable: true }
        steps:
          type: array
          items: { $ref: '#/components/schemas/RequestStep' }

    RequestStep:
      type: object
      properties:
        id: { type: integer }
        workflow_step_id: { type: integer }
        status: { type: string, enum: [pending, active, approved, rejected, returned, skipped] }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        approvers:
          type: array
          items: { $ref: '#/components/schemas/RequestStepApprover' }

    RequestStepApprover:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer, description: "The acting approver (may be a delegate)" }
        acting_for_user_id: { type: integer, nullable: true, description: "Set when user_id is acting as a delegate for this original approver" }
        decision: { type: string, enum: [pending, approved, rejected, returned] }
        comments: { type: string, nullable: true }
        decided_at: { type: string, format: date-time, nullable: true }

    AuditLogEntry:
      type: object
      properties:
        id: { type: integer }
        request_id: { type: integer }
        user_id: { type: integer, nullable: true, description: "Null for system-generated events" }
        action: { type: string, enum: [submitted, resubmitted, step_advanced, approved, rejected, returned, completed] }
        previous_status: { type: string, nullable: true }
        new_status: { type: string, nullable: true }
        comments: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Delegation:
      type: object
      properties:
        id: { type: integer }
        delegator_id: { type: integer }
        delegate_id: { type: integer }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }

    Notification:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        request_id: { type: integer, nullable: true }
        type:
          type: string
          enum: [request_submitted, request_approved, request_rejected, request_returned, approval_pending]
        message: { type: string }
        read_at: { type: string, format: date-time, nullable: true }

    PaginatedUsers:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/User' }

    PaginatedWorkflows:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Workflow' }

    PaginatedRequests:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/WorkflowRequest' }

    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        last_page: { type: integer }
